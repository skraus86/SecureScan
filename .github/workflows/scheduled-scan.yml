name: Scheduled Security Scan

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  full-security-scan:
    name: Full Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SecureScan
        run: |
          pip install -e .
          pip install -r requirements.txt

      - name: Run Full Security Scan
        run: |
          python -m securescan . \
            --output ./security-reports \
            --format json,html,sarif \
            --no-fail

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./security-reports/securescan_*.sarif

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-security-reports-${{ github.run_number }}
          path: ./security-reports/
          retention-days: 90

      - name: Create Issue for Critical Findings
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const reportsDir = './security-reports';
            const files = fs.readdirSync(reportsDir);
            const jsonFile = files.find(f => f.endsWith('.json') && !f.includes('executive'));
            
            if (!jsonFile) return;
            
            const report = JSON.parse(fs.readFileSync(path.join(reportsDir, jsonFile), 'utf8'));
            const summary = report.summary;
            
            // Only create issue if critical or high findings
            if (summary.by_severity.critical === 0 && summary.by_severity.high === 0) {
              console.log('No critical or high findings, skipping issue creation');
              return;
            }
            
            const title = `🚨 Security Alert: ${summary.by_severity.critical} Critical, ${summary.by_severity.high} High Severity Issues Found`;
            
            // Check if similar issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated'
            });
            
            const existingIssue = issues.data.find(i => i.title.includes('Security Alert'));
            
            const body = `## Security Scan Results - ${new Date().toISOString().split('T')[0]}
            
            A scheduled security scan has detected the following issues:
            
            ### Summary
            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${summary.by_severity.critical} |
            | 🟠 High | ${summary.by_severity.high} |
            | 🟡 Medium | ${summary.by_severity.medium} |
            | 🔵 Low | ${summary.by_severity.low} |
            
            ### Top Critical/High Issues
            ${report.findings
              .filter(f => f.severity === 'critical' || f.severity === 'high')
              .slice(0, 10)
              .map(f => `- **${f.title}** (${f.severity.toUpperCase()}) - \`${f.location.file_path}:${f.location.start_line}\``)
              .join('\n')}
            
            ### Action Required
            1. Review the full security report in the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            2. Prioritize and remediate critical issues immediately
            3. Create follow-up tasks for high severity issues
            
            ---
            *This issue was automatically created by SecureScan*
            `;
            
            if (existingIssue) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'automated', 'high-priority']
              });
            }
